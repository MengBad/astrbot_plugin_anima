<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anima 全景控制台门户</title>
  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-main: #090d16;
      --bg-card: rgba(15, 23, 42, 0.65);
      --border-color: rgba(255, 255, 255, 0.08);
      --accent-color: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.35);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-title: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: var(--font-body);
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Background Neon Effects */
    body::before, body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, rgba(99, 102, 241, 0) 70%);
      z-index: -1;
      filter: blur(80px);
      pointer-events: none;
    }
    body::before {
      top: -10%;
      right: 10%;
    }
    body::after {
      bottom: -10%;
      left: 10%;
    }

    /* Header Navigation */
    .portal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-color);
      z-index: 100;
      height: 60px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: var(--accent-color);
      stroke-width: 2.5;
      filter: drop-shadow(0 0 6px var(--accent-color));
    }

    .brand-title {
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 18px;
      background: linear-gradient(135deg, #a5b4fc 0%, #818cf8 50%, #6366f1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    .nav-tabs {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(2, 6, 23, 0.4);
      padding: 4px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }

    .nav-tab {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-tab:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.04);
    }

    .nav-tab.active {
      color: #fff;
      background: var(--accent-color);
      box-shadow: 0 0 14px var(--accent-glow);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #34d399;
      background: rgba(52, 211, 153, 0.1);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(52, 211, 153, 0.2);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background-color: #34d399;
      border-radius: 50%;
      box-shadow: 0 0 8px #34d399;
      animation: pulse 2s infinite;
    }

    .btn-refresh {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .btn-refresh:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-main);
      border-color: rgba(255, 255, 255, 0.15);
    }

    /* Content Area */
    .portal-content {
      flex: 1;
      position: relative;
      background-color: var(--bg-main);
    }

    /* Split Screen Layout Grid */
    .split-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 12px;
      padding: 12px;
      height: 100%;
      width: 100%;
      transition: grid-template-columns 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .split-panel {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .split-panel:hover {
      border-color: rgba(99, 102, 241, 0.3);
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.05);
    }

    .split-panel.collapsed {
      display: none !important;
    }

    .panel-header {
      padding: 10px 16px;
      background: rgba(15, 23, 42, 0.5);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .panel-header span.dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-color);
      box-shadow: 0 0 6px var(--accent-color);
    }

    .panel-body {
      flex: 1;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
    }

    .btn-toggle {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      margin-left: auto;
      font-size: 14px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .btn-toggle:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.05);
    }

    /* Timeline visual styles */
    .timeline {
      position: relative;
      padding-left: 20px;
      border-left: 2px solid rgba(255, 255, 255, 0.06);
      margin-top: 10px;
    }

    .timeline-item {
      position: relative;
      margin-bottom: 24px;
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: -26px;
      top: 4px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent-color);
      border: 2px solid var(--bg-main);
      box-shadow: 0 0 8px var(--accent-color);
    }

    .timeline-time {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-body);
      margin-bottom: 4px;
    }

    .timeline-type {
      font-size: 12px;
      font-weight: 600;
      color: #a78bfa;
      background: rgba(167, 139, 250, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 6px;
    }

    .timeline-desc {
      font-size: 13px;
      color: var(--text-main);
      line-height: 1.5;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.03);
      padding: 10px;
      border-radius: 8px;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(0.95); opacity: 0.8; }
    }

    /* Responsiveness for Split Screen */
    @media (max-width: 1024px) {
      .split-grid {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
        overflow-y: auto;
      }
      .split-panel {
        height: 600px;
      }
    }
  </style>
</head>
<body>

  <!-- Top Navigation Header -->
  <header class="portal-header">
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="40" stroke-dasharray="180 80"/>
        <circle cx="50" cy="50" r="22" stroke-dasharray="90 30"/>
        <line x1="50" y1="10" x2="50" y2="90" />
        <line x1="10" y1="50" x2="90" y2="50" />
      </svg>
      <span class="brand-title">Anima Portal</span>
    </div>

    <!-- Navigation Tabs -->
    <div class="nav-tabs">
      <button id="tab-split" class="nav-tab active" onclick="switchView('split')">🖥️ 全景分屏</button>
      <button id="tab-sylanne" class="nav-tab" onclick="switchView('sylanne')">🧠 Sylanne 意识</button>
      <button id="tab-dashboard" class="nav-tab" onclick="switchView('dashboard')">📊 运行仪表盘</button>
      <button id="tab-captree" class="nav-tab" onclick="switchView('captree')">🌳 能力树</button>
      <button id="tab-mutation" class="nav-tab" onclick="switchView('mutation')">🧬 核心突变演化</button>
    </div>

    <div class="header-actions">
      <div class="status-badge">
        <div class="status-dot"></div>
        <span>Anima Engine Live</span>
      </div>
      <button class="btn-refresh" title="刷新全部视图" onclick="refreshAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l.73-.73" />
        </svg>
      </button>
    </div>
  </header>

  <!-- Main View Frame Area -->
  <main class="portal-content">
    <div class="split-grid" id="main-grid">
      <!-- Panel 1: Sylanne Consciousness -->
      <div class="split-panel" id="panel-sylanne">
        <div class="panel-header">
          <span class="dot"></span>
          <span>Sylanne 意识状态</span>
          <button class="btn-toggle" title="最大化" onclick="toggleMaximize('sylanne')">🗖</button>
        </div>
        <div class="panel-body">
          <iframe id="sylanne-iframe" src="about:blank"></iframe>
        </div>
      </div>
      
      <!-- Panel 2: Anima Dashboard -->
      <div class="split-panel" id="panel-dashboard">
        <div class="panel-header">
          <span class="dot" style="background:#38bdf8;box-shadow:0 0 6px #38bdf8;"></span>
          <span>Anima 运行仪表盘</span>
          <button class="btn-toggle" title="最大化" onclick="toggleMaximize('dashboard')">🗖</button>
        </div>
        <div class="panel-body">
          <iframe id="dashboard-iframe" src="about:blank"></iframe>
        </div>
      </div>

      <!-- Panel 3: Anima Capability Tree -->
      <div class="split-panel" id="panel-captree">
        <div class="panel-header">
          <span class="dot" style="background:#34d399;box-shadow:0 0 6px #34d399;"></span>
          <span>Anima 能力树结构</span>
          <button class="btn-toggle" title="最大化" onclick="toggleMaximize('captree')">🗖</button>
        </div>
        <div class="panel-body">
          <iframe id="captree-iframe" src="about:blank"></iframe>
        </div>
      </div>

      <!-- Panel 4: Mutation History Timeline -->
      <div class="split-panel" id="panel-mutation">
        <div class="panel-header">
          <span class="dot" style="background:#a78bfa;box-shadow:0 0 6px #a78bfa;"></span>
          <span>🧬 核心人设突变演化历程</span>
          <button class="btn-toggle" title="最大化" onclick="toggleMaximize('mutation')">🗖</button>
        </div>
        <div class="panel-body" style="padding:16px; overflow-y:auto; background:rgba(15,23,42,0.4);">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:8px;">
            <p style="font-size:12px; color:var(--text-muted);">
              这里记录了 AI 核心人格的突变轨迹（保留最近 100 次）。
            </p>
            <button class="btn-rollback" onclick="triggerRollback()" style="background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.25); color:#f87171; padding:6px 12px; border-radius:6px; font-size:12px; cursor:pointer; font-weight:600; transition:all 0.2s;">
              ↩ 撤销并回滚至上一人设版本
            </button>
          </div>
          <div id="timeline-container" class="timeline">
            <p style="color:var(--text-muted); font-size:13px; text-align:center; padding:20px;">加载突变历史中...</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- JS Controller for Tab and Token Management -->
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    let csrfToken = '';

    function escHtml(s) {
      if (s == null) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    const urls = {
      sylanne: `/sylanne/?token=${encodeURIComponent(token)}`,
      dashboard: `/dashboard/?token=${encodeURIComponent(token)}`,
      captree: `/capability-tree/?token=${encodeURIComponent(token)}`
    };

    // Load iframe sources on initial load
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById('sylanne-iframe').src = urls.sylanne;
      document.getElementById('dashboard-iframe').src = urls.dashboard;
      document.getElementById('captree-iframe').src = urls.captree;

      // Fetch state once to get CSRF token and then load timeline
      fetch(`/api/state?token=${encodeURIComponent(token)}`)
        .then(r => r.json())
        .then(data => {
          csrfToken = data.csrf_token || '';
          loadMutationHistory();
        })
        .catch(e => {
          console.error("加载 CSRF Token 失败", e);
          loadMutationHistory();
        });
    });

    // View Switcher logic (Dynamic Grid-Collapsing)
    function switchView(target) {
      const grid = document.getElementById('main-grid');
      const panels = {
        sylanne: document.getElementById('panel-sylanne'),
        dashboard: document.getElementById('panel-dashboard'),
        captree: document.getElementById('panel-captree'),
        mutation: document.getElementById('panel-mutation')
      };
      
      const buttons = document.querySelectorAll('.nav-tab');
      buttons.forEach(btn => {
        btn.classList.toggle('active', btn.id === `tab-${target}`);
      });

      // Reset all collapsed states
      Object.values(panels).forEach(p => p.classList.remove('collapsed'));

      if (target === 'split') {
        grid.style.gridTemplateColumns = '1fr 1fr 1fr 1fr';
      } else {
        grid.style.gridTemplateColumns = '1fr';
        Object.keys(panels).forEach(key => {
          if (key !== target) {
            panels[key].classList.add('collapsed');
          }
        });
      }
    }

    function toggleMaximize(panelKey) {
      // If currently maximized, switch back to split view; else maximize this panel
      const otherKey = panelKey === 'sylanne' ? 'dashboard' : 'sylanne';
      const isMaximized = document.getElementById(`panel-${otherKey}`).classList.contains('collapsed');
      switchView(isMaximized ? 'split' : panelKey);
    }

    // Load mutations history via API
    function loadMutationHistory() {
      const container = document.getElementById('timeline-container');
      fetch(`/api/mutation_history?token=${encodeURIComponent(token)}`)
        .then(r => r.json())
        .then(data => {
          if (!data.ok || !data.history || data.history.length === 0) {
            container.innerHTML = '<p style="color:var(--text-muted); font-size:13px; text-align:center; padding:20px;">尚无核心突变记录。</p>';
            return;
          }
          // Show newest mutations first
          const history = [...data.history].reverse();
          container.innerHTML = history.map(item => {
            const timeStr = item.timestamp ? new Date(item.timestamp).toLocaleString('zh-CN') : '未知时间';
            return `
              <div class="timeline-item">
                <div class="timeline-time">${escHtml(timeStr)}</div>
                <span class="timeline-type">${escHtml(item.type || '突变')}</span>
                <div class="timeline-desc">${escHtml(item.description || '无具体内容描述')}</div>
              </div>
            `;
          }).join('');
        })
        .catch(e => {
          container.innerHTML = '<p style="color:#ef4444; font-size:13px; text-align:center; padding:20px;">加载突变历史失败，请尝试刷新。</p>';
        });
    }

    // Trigger mutation rollback POST request
    function triggerRollback() {
      if (!confirm("确定要撤销最新核心突变并回退到上一个版本的人设配置文件吗？\n警告：这将会覆盖当前的 core_beliefs 并且重载人格。")) {
        return;
      }
      fetch(`/api/mutation_rollback?token=${encodeURIComponent(token)}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRF-Token': csrfToken
        }
      })
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          alert("回滚成功！核心人设文件已成功恢复，并已写入演化日志。");
          loadMutationHistory();
        } else {
          alert(`回滚失败: ${data.error || '未知错误'}`);
        }
      })
      .catch(e => {
        alert("请求回滚失败，请检查网络或刷新页面。");
      });
    }

    // Refresh all internal views
    function refreshAll() {
      const iframes = document.querySelectorAll('iframe');
      iframes.forEach(iframe => {
        const src = iframe.src;
        iframe.src = 'about:blank';
        setTimeout(() => { iframe.src = src; }, 50);
      });
      loadMutationHistory();
    }
  </script>
</body>
</html>
