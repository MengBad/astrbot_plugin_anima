<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anima 全景控制台门户</title>
  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-main: #090d16;
      --bg-card: rgba(15, 23, 42, 0.65);
      --border-color: rgba(255, 255, 255, 0.08);
      --accent-color: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.35);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-title: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: var(--font-body);
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Background Neon Effects */
    body::before, body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, rgba(99, 102, 241, 0) 70%);
      z-index: -1;
      filter: blur(80px);
      pointer-events: none;
    }
    body::before {
      top: -10%;
      right: 10%;
    }
    body::after {
      bottom: -10%;
      left: 10%;
    }

    /* Header Navigation */
    .portal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-color);
      z-index: 100;
      height: 60px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: var(--accent-color);
      stroke-width: 2.5;
      filter: drop-shadow(0 0 6px var(--accent-color));
    }

    .brand-title {
      font-family: var(--font-title);
      font-weight: 800;
      font-size: 18px;
      background: linear-gradient(135deg, #a5b4fc 0%, #818cf8 50%, #6366f1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    .nav-tabs {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(2, 6, 23, 0.4);
      padding: 4px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }

    .nav-tab {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-tab:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.04);
    }

    .nav-tab.active {
      color: #fff;
      background: var(--accent-color);
      box-shadow: 0 0 14px var(--accent-glow);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #34d399;
      background: rgba(52, 211, 153, 0.1);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(52, 211, 153, 0.2);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background-color: #34d399;
      border-radius: 50%;
      box-shadow: 0 0 8px #34d399;
      animation: pulse 2s infinite;
    }

    .btn-refresh {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .btn-refresh:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-main);
      border-color: rgba(255, 255, 255, 0.15);
    }

    /* Content Area */
    .portal-content {
      flex: 1;
      position: relative;
      background-color: var(--bg-main);
    }

    /* Iframe Containers */
    .view-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      transition: opacity 0.3s ease, transform 0.3s ease;
      transform: scale(0.99);
    }

    .view-container.active {
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
      transform: scale(1);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
    }

    /* Split Screen Layout Grid */
    .split-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      padding: 12px;
      height: 100%;
      width: 100%;
    }

    .split-panel {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .split-panel:hover {
      border-color: rgba(99, 102, 241, 0.3);
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.05);
    }

    .panel-header {
      padding: 10px 16px;
      background: rgba(15, 23, 42, 0.5);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .panel-header span.dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-color);
      box-shadow: 0 0 6px var(--accent-color);
    }

    .panel-body {
      flex: 1;
      position: relative;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(0.95); opacity: 0.8; }
    }

    /* Responsiveness for Split Screen */
    @media (max-width: 1024px) {
      .split-grid {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr 1fr;
        overflow-y: auto;
      }
      .split-panel {
        height: 600px;
      }
    }
  </style>
</head>
<body>

  <!-- Top Navigation Header -->
  <header class="portal-header">
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="40" stroke-dasharray="180 80"/>
        <circle cx="50" cy="50" r="22" stroke-dasharray="90 30"/>
        <line x1="50" y1="10" x2="50" y2="90" />
        <line x1="10" y1="50" x2="90" y2="50" />
      </svg>
      <span class="brand-title">Anima Portal</span>
    </div>

    <!-- Navigation Tabs -->
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchView('sylanne-view')">🧠 Sylanne 意识</button>
      <button class="nav-tab" onclick="switchView('dashboard-view')">📊 运行仪表盘</button>
      <button class="nav-tab" onclick="switchView('captree-view')">🌳 能力树</button>
      <button class="nav-tab" onclick="switchView('split-view')">🖥️ 全景分屏</button>
    </div>

    <div class="header-actions">
      <div class="status-badge">
        <div class="status-dot"></div>
        <span>Anima Engine Live</span>
      </div>
      <button class="btn-refresh" title="刷新全部视图" onclick="refreshAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l.73-.73" />
        </svg>
      </button>
    </div>
  </header>

  <!-- Main View Frame Area -->
  <main class="portal-content">
    
    <!-- View 1: Sylanne Consciousness -->
    <div id="sylanne-view" class="view-container active">
      <iframe id="sylanne-iframe" src="about:blank"></iframe>
    </div>

    <!-- View 2: Anima Runtime Dashboard -->
    <div id="dashboard-view" class="view-container">
      <iframe id="dashboard-iframe" src="about:blank"></iframe>
    </div>

    <!-- View 3: Anima Capability Tree -->
    <div id="captree-view" class="view-container">
      <iframe id="captree-iframe" src="about:blank"></iframe>
    </div>

    <!-- View 4: Split Panorama Grid View -->
    <div id="split-view" class="view-container">
      <div class="split-grid">
        <div class="split-panel">
          <div class="panel-header">
            <span class="dot"></span>
            Sylanne 意识状态
          </div>
          <div class="panel-body">
            <iframe id="split-sylanne-iframe" src="about:blank"></iframe>
          </div>
        </div>
        <div class="split-panel">
          <div class="panel-header">
            <span class="dot" style="background:#38bdf8;box-shadow:0 0 6px #38bdf8;"></span>
            Anima 运行仪表盘
          </div>
          <div class="panel-body">
            <iframe id="split-dashboard-iframe" src="about:blank"></iframe>
          </div>
        </div>
        <div class="split-panel">
          <div class="panel-header">
            <span class="dot" style="background:#34d399;box-shadow:0 0 6px #34d399;"></span>
            Anima 能力树结构
          </div>
          <div class="panel-body">
            <iframe id="split-captree-iframe" src="about:blank"></iframe>
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- JS Controller for Tab and Token Management -->
  <script>
    // Extract token from location.search and propagate to standard relative paths
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';

    // Standard absolute URLs with tokens
    const urls = {
      sylanne: `/sylanne/?token=${encodeURIComponent(token)}`,
      dashboard: `/dashboard/?token=${encodeURIComponent(token)}`,
      captree: `/capability-tree/?token=${encodeURIComponent(token)}`
    };

    // Load iframe sources on initial load
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById('sylanne-iframe').src = urls.sylanne;
      document.getElementById('dashboard-iframe').src = urls.dashboard;
      document.getElementById('captree-iframe').src = urls.captree;

      // Also pre-populate split view iframes
      document.getElementById('split-sylanne-iframe').src = urls.sylanne;
      document.getElementById('split-dashboard-iframe').src = urls.dashboard;
      document.getElementById('split-captree-iframe').src = urls.captree;
    });

    // View Switcher logic
    function switchView(targetId) {
      // Manage active states of navigation buttons
      const buttons = document.querySelectorAll('.nav-tab');
      buttons.forEach(btn => {
        // Toggle active styling based on clicked button action
        const actionAttr = btn.getAttribute('onclick');
        if (actionAttr.includes(targetId)) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });

      // Manage active states of content container panels
      const containers = document.querySelectorAll('.view-container');
      containers.forEach(container => {
        if (container.id === targetId) {
          container.classList.add('active');
        } else {
          container.classList.remove('active');
        }
      });
    }

    // Refresh all internal views
    function refreshAll() {
      const iframes = document.querySelectorAll('iframe');
      iframes.forEach(iframe => {
        const src = iframe.src;
        iframe.src = 'about:blank';
        // Force refresh source URL reload
        setTimeout(() => { iframe.src = src; }, 50);
      });
    }
  </script>
</body>
</html>
