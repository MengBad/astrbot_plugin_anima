<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anima 认知观测台</title>
  <style>
    :root {
      --bg-main: #090d16;
      --bg-card: rgba(15, 23, 42, 0.65);
      --bg-panel: rgba(15, 23, 42, 0.4);
      --border-color: rgba(255, 255, 255, 0.08);
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.35);
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --blue: #38bdf8;
      --purple: #a78bfa;
      --pink: #f9a8d4;
      --cyan: #22d3ee;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-main); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      overflow: hidden; height: 100vh; display: flex; flex-direction: column;
    }

    /* ═══ Header ═══ */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 20px; background: rgba(15,23,42,0.85);
      backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color);
      z-index: 100; height: 52px;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand svg { width: 24px; height: 24px; fill: none; stroke: var(--accent); stroke-width: 2.5; }
    .brand-text { font-weight: 700; font-size: 16px; letter-spacing: 0.3px; }
    .tabs { display: flex; gap: 4px; background: rgba(2,6,23,0.5); padding: 3px; border-radius: 10px; }
    .tab {
      background: transparent; border: none; color: var(--text-muted);
      font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 8px;
      cursor: pointer; transition: all 0.2s;
    }
    .tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .tab.active { color: #fff; background: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .status { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--green); }
    .status-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
    .btn-sm { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-muted); cursor: pointer; width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.2s; }
    .btn-sm:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    /* ═══ Content ═══ */
    .content { flex: 1; overflow: hidden; }
    .view { display: none; height: 100%; }
    .view.active { display: flex; }

    /* ═══ Split View (2x2) ═══ */
    .split-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; padding: 10px; height: 100%; }
    .split-panel { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
    .panel-head { padding: 8px 12px; background: rgba(15,23,42,0.5); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--text-muted); }
    .panel-head .dot { width: 7px; height: 7px; border-radius: 50%; }
    .panel-body { flex: 1; }
    .panel-body iframe { width: 100%; height: 100%; border: none; }

    /* ═══ Observatory View ═══ */
    .obs { display: flex; flex-direction: column; height: 100%; padding: 10px; gap: 10px; }

    /* §1 Health Bar */
    .health-bar { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
    .health-item {
      background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px;
      padding: 10px 12px; text-align: center;
    }
    .health-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .health-value { font-size: 20px; font-weight: 700; margin: 4px 0 2px; }
    .health-status { font-size: 10px; }
    .health-status.ok { color: var(--green); }
    .health-status.warn { color: var(--yellow); }
    .health-status.bad { color: var(--red); }

    /* §2 Sub-panels */
    .sub-tabs { display: flex; gap: 3px; flex-wrap: wrap; }
    .sub-tab {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border-color);
      color: var(--text-muted); font-size: 11px; padding: 5px 10px; border-radius: 6px;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .sub-tab:hover { color: var(--text); background: rgba(255,255,255,0.06); }
    .sub-tab.active { color: #fff; background: var(--accent); border-color: var(--accent); }
    .sub-content {
      flex: 1; overflow-y: auto; background: var(--bg-card);
      border: 1px solid var(--border-color); border-radius: 8px; padding: 12px;
    }
    .sub-content::-webkit-scrollbar { width: 4px; }
    .sub-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* §3 Timeline */
    .timeline-section { flex-shrink: 0; }
    .timeline-bar {
      display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap;
    }
    .timeline-bar input, .timeline-bar select {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border-color);
      color: var(--text); padding: 5px 10px; border-radius: 6px; font-size: 12px; outline: none;
    }
    .timeline-bar input:focus, .timeline-bar select:focus { border-color: var(--accent); }
    .timeline-bar input { flex: 1; min-width: 150px; }
    .btn-action {
      background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3);
      color: var(--accent); padding: 5px 12px; border-radius: 6px; font-size: 11px;
      cursor: pointer; font-weight: 600; transition: all 0.15s;
    }
    .btn-action:hover { background: rgba(99,102,241,0.25); }
    .btn-danger {
      background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.25);
      color: var(--red); padding: 5px 12px; border-radius: 6px; font-size: 11px;
      cursor: pointer; font-weight: 600;
    }
    .btn-danger:hover { background: rgba(248,113,113,0.2); }
    .timeline-events {
      max-height: 180px; overflow-y: auto; border: 1px solid var(--border-color);
      border-radius: 8px; background: var(--bg-card);
    }
    .timeline-events::-webkit-scrollbar { width: 4px; }
    .timeline-events::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .ev { padding: 8px 12px; border-bottom: 1px solid var(--border-color); font-size: 12px; display: flex; gap: 10px; align-items: flex-start; }
    .ev:last-child { border-bottom: none; }
    .ev-time { color: var(--text-muted); white-space: nowrap; min-width: 60px; }
    .ev-type { color: var(--purple); font-weight: 600; white-space: nowrap; min-width: 100px; }
    .ev-detail { color: var(--text-muted); flex: 1; word-break: break-all; }
    .ev-tag { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
    .ev-tag.info { background: rgba(99,102,241,0.15); color: var(--accent); }
    .ev-tag.warn { background: rgba(251,191,36,0.15); color: var(--yellow); }
    .ev-tag.error { background: rgba(248,113,113,0.15); color: var(--red); }

    /* Empty state */
    .empty { text-align: center; padding: 24px 16px; color: var(--text-muted); }
    .empty-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.5; }
    .empty-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .empty-desc { font-size: 11px; line-height: 1.6; max-width: 400px; margin: 0 auto; }
    .empty-hint { font-size: 10px; color: var(--yellow); margin-top: 8px; }

    /* Data rows */
    .data-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 12px;
    }
    .data-row:last-child { border-bottom: none; }
    .data-name { font-weight: 600; color: var(--text); }
    .data-meta { color: var(--text-muted); }
    .data-tags { display: flex; gap: 4px; }
    .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; }
    .tag-present { background: rgba(52,211,153,0.12); color: var(--green); }
    .tag-missing { background: rgba(248,113,113,0.12); color: var(--red); }
    .tag-size { background: rgba(255,255,255,0.05); color: var(--text-muted); }
    .tag-action { background: rgba(99,102,241,0.12); color: var(--accent); cursor: pointer; }
    .tag-action:hover { background: rgba(99,102,241,0.25); }

    /* Snapshot rows */
    .snap-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px;
    }
    .snap-row:last-child { border-bottom: none; }

    @keyframes pulse { 0%,100% { opacity: 0.8; } 50% { opacity: 1; } }
    @media (max-width: 1024px) { .split-grid { grid-template-columns: 1fr; grid-template-rows: repeat(4, 1fr); } .health-bar { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px) { .header { flex-wrap: wrap; height: auto; padding: 8px 12px; } .tabs { flex-wrap: wrap; } .health-bar { grid-template-columns: repeat(2, 1fr); } .sub-tabs { gap: 2px; } .sub-tab { font-size: 10px; padding: 4px 6px; } }

    /* Help tooltips */
    .help-tip { display: inline-block; width: 14px; height: 14px; border-radius: 50%; background: rgba(255,255,255,0.08); color: var(--text-muted); font-size: 9px; text-align: center; line-height: 14px; cursor: help; margin-left: 4px; position: relative; }
    .help-tip:hover { background: rgba(99,102,241,0.2); color: var(--accent); }
    .help-tip::after { content: attr(data-tip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: rgba(15,23,42,0.95); border: 1px solid var(--border-color); border-radius: 6px; padding: 6px 10px; font-size: 11px; color: var(--text); white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 10; }
    .help-tip:hover::after { opacity: 1; }
  </style>
</head>
<body>

  <!-- ═══ Header ═══ -->
  <header class="header">
    <div class="brand">
      <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" stroke-dasharray="180 80"/><circle cx="50" cy="50" r="22" stroke-dasharray="90 30"/><line x1="50" y1="10" x2="50" y2="90"/><line x1="10" y1="50" x2="90" y2="50"/></svg>
      <span class="brand-text">Anima 认知观测台</span>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchView('split')">全景</button>
      <button class="tab" onclick="switchView('sylanne')">Sylanne</button>
      <button class="tab" onclick="switchView('dashboard')">仪表盘</button>
      <button class="tab" onclick="switchView('captree')">能力树</button>
      <button class="tab" onclick="switchView('observatory')">观测台</button>
      <button class="tab" onclick="switchView('mutation')">突变</button>
    </div>
    <div class="header-right">
      <button class="btn-action" id="demo-btn" onclick="toggleDemoMode()" style="font-size:11px;">演示模式: 关</button>
      <div class="status"><div class="status-dot"></div><span>运行中</span></div>
      <button class="btn-sm" onclick="refreshAll()" title="刷新">⟳</button>
    </div>
  </header>

  <!-- ═══ Content ═══ -->
  <div class="content">

    <!-- View: Split (2x2) -->
    <div class="view active" id="view-split">
      <div class="split-grid">
        <div class="split-panel"><div class="panel-head"><div class="dot" style="background:var(--accent)"></div>Sylanne 意识</div><div class="panel-body"><iframe id="frame-sylanne" src="about:blank"></iframe></div></div>
        <div class="split-panel"><div class="panel-head"><div class="dot" style="background:var(--blue)"></div>运行仪表盘</div><div class="panel-body"><iframe id="frame-dashboard" src="about:blank"></iframe></div></div>
        <div class="split-panel"><div class="panel-head"><div class="dot" style="background:var(--green)"></div>能力树</div><div class="panel-body"><iframe id="frame-captree" src="about:blank"></iframe></div></div>
        <div class="split-panel"><div class="panel-head"><div class="dot" style="background:var(--purple)"></div>核心突变</div><div class="panel-body" style="padding:12px; overflow-y:auto;" id="split-mutation"></div></div>
      </div>
    </div>

    <!-- View: Sylanne -->
    <div class="view" id="view-sylanne"><div style="flex:1"><iframe id="frame-sylanne2" src="about:blank" style="width:100%;height:100%;border:none"></iframe></div></div>

    <!-- View: Dashboard -->
    <div class="view" id="view-dashboard"><div style="flex:1"><iframe id="frame-dashboard2" src="about:blank" style="width:100%;height:100%;border:none"></iframe></div></div>

    <!-- View: Capability Tree -->
    <div class="view" id="view-captree"><div style="flex:1"><iframe id="frame-captree2" src="about:blank" style="width:100%;height:100%;border:none"></iframe></div></div>

    <!-- View: Observatory -->
    <div class="view" id="view-observatory">
      <div class="obs">
        <!-- §1 Health Bar -->
        <div class="health-bar" id="health-bar">
          <div class="health-item"><div class="health-label">主机 <span class="help-tip" data-tip="活跃的 Sylanne 会话主机数">?</span></div><div class="health-value" id="h-hosts">-</div><div class="health-status" id="h-hosts-s"></div></div>
          <div class="health-item"><div class="health-label">记忆系统 <span class="help-tip" data-tip="向量记忆系统的活跃实例数">?</span></div><div class="health-value" id="h-memory">-</div><div class="health-status" id="h-memory-s"></div></div>
          <div class="health-item"><div class="health-label">后台任务 <span class="help-tip" data-tip="沉淀、反刍、持久化等后台任务">?</span></div><div class="health-value" id="h-tasks">-</div><div class="health-status" id="h-tasks-s"></div></div>
          <div class="health-item"><div class="health-label">运行事件 <span class="help-tip" data-tip="运行时认知事件总数">?</span></div><div class="health-value" id="h-events">-</div><div class="health-status" id="h-events-s"></div></div>
          <div class="health-item"><div class="health-label">存储源 <span class="help-tip" data-tip="已注册的持久化文件数量">?</span></div><div class="health-value" id="h-sources">-</div><div class="health-status" id="h-sources-s"></div></div>
          <div class="health-item"><div class="health-label">KV 存储 <span class="help-tip" data-tip="AstrBot KV API 是否可用">?</span></div><div class="health-value" id="h-kv">-</div><div class="health-status" id="h-kv-s"></div></div>
        </div>

        <!-- §2 Sub-panels -->
        <div style="flex:1; display:flex; flex-direction:column; min-height:0;">
          <div class="sub-tabs" id="sub-tabs">
            <button class="sub-tab active" onclick="switchSub('inspector')" title="会话拓扑、脏标记、持久化文件状态">状态检查 <span class="help-tip" onclick="event.stopPropagation();showHelp('inspector')" data-tip="点击查看帮助">?</span></button>
            <button class="sub-tab" onclick="switchSub('store')" title="文件/运行时/KV 状态源清单和快照管理">存储审计 <span class="help-tip" onclick="event.stopPropagation();showHelp('store')" data-tip="点击查看帮助">?</span></button>
            <button class="sub-tab" onclick="switchSub('tasks')" title="沉淀、反刍、持久化等后台任务状态">后台任务 <span class="help-tip" onclick="event.stopPropagation();showHelp('tasks')" data-tip="点击查看帮助">?</span></button>
            <button class="sub-tab" onclick="switchSub('memory')" title="L1/L2/L3 向量记忆拓扑和召回证据">记忆探索 <span class="help-tip" onclick="event.stopPropagation();showHelp('memory')" data-tip="点击查看帮助">?</span></button>
            <button class="sub-tab" onclick="switchSub('desire')" title="欲望队列健康度和生命周期事件">欲望系统 <span class="help-tip" onclick="event.stopPropagation();showHelp('desire')" data-tip="点击查看帮助">?</span></button>
            <button class="sub-tab" onclick="switchSub('scar')" title="伤痕代数、愈合阶段和边界状态">创伤浏览器 <span class="help-tip" onclick="event.stopPropagation();showHelp('scar')" data-tip="点击查看帮助">?</span></button>
            <button class="sub-tab" onclick="switchSub('drift')" title="5D 人格向量和漂移趋势">人格漂移 <span class="help-tip" onclick="event.stopPropagation();showHelp('drift')" data-tip="点击查看帮助">?</span></button>
            <button class="sub-tab" onclick="switchSub('trace')" title="提示注入、工具调用和响应观察的决策路径">推理轨迹 <span class="help-tip" onclick="event.stopPropagation();showHelp('trace')" data-tip="点击查看帮助">?</span></button>
            <button class="sub-tab" onclick="switchSub('replay')" title="会话事件和消息形状回放">会话回放 <span class="help-tip" onclick="event.stopPropagation();showHelp('replay')" data-tip="点击查看帮助">?</span></button>
            <button class="sub-tab" onclick="switchSub('trend')" title="多会话情绪、边界和人格对比">跨会话趋势 <span class="help-tip" onclick="event.stopPropagation();showHelp('trend')" data-tip="点击查看帮助">?</span></button>
          </div>
          <div class="sub-content" id="sub-content"></div>
        </div>

        <!-- §3 Timeline -->
        <div class="timeline-section">
          <div class="timeline-bar">
            <input type="text" id="tl-search" placeholder="搜索事件关键词..." onkeydown="if(event.key==='Enter')searchEvents()">
            <select id="tl-severity"><option value="">全部级别</option><option value="info">信息</option><option value="warning">警告</option><option value="error">错误</option></select>
            <button class="btn-action" onclick="searchEvents()">搜索</button>
            <button class="btn-action" onclick="loadTimeline()">刷新</button>
            <button class="btn-action" id="auto-refresh-btn" onclick="toggleAutoRefresh()">实时推送: 开</button>
            <button class="btn-danger" onclick="compactEvents()">压缩旧事件</button>
          </div>
          <div class="timeline-events" id="timeline-events">
            <div class="empty"><div class="empty-icon">⏳</div><div class="empty-title">加载中...</div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- View: Mutation -->
    <div class="view" id="view-mutation">
      <div style="flex:1; padding:16px; overflow-y:auto;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
          <h3 style="font-size:15px;">核心突变演化</h3>
          <button class="btn-danger" onclick="triggerRollback()">回滚至上一版本</button>
        </div>
        <div id="mutation-timeline"></div>
      </div>
    </div>
  </div>

  <!-- ═══ JavaScript ═══ -->
  <script>
    // ── Token & Route ─────────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    let csrfToken = '';
    const routeBase = window.location.pathname.startsWith('/astrbot_plugin_anima') ? '/astrbot_plugin_anima' : '';
    function rp(p) { return routeBase + p; }
    function esc(s) { return s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function fmtTime(ts) { return ts ? new Date(Number(ts)*1000).toLocaleString('zh-CN') : '-'; }
    function summarizePayload(p) {
      if (!p || typeof p !== 'object') return '';
      return Object.entries(p).slice(0,5).map(([k,v]) => `${k}: ${String(v&&typeof v==='object'?JSON.stringify(v):v).slice(0,100)}`).join(' ');
    }

    // ── Translation maps ──────────────────────────────────────────────
    const CAP_MAP = { partial:'部分可用', metadata_ready:'元数据就绪', partial_persona_core_only:'仅核心人设可回滚', runtime_events_jsonl:'事件时间线' };
    const LABEL_MAP = {
      'State Inspector':'状态检查器', 'StateStore Audit':'存储审计', 'Background Tasks':'后台任务',
      'Memory Explorer':'记忆探索', 'Memory Recall Replay':'记忆召回回放',
      'Desire Dashboard':'欲望仪表盘', 'Desire Evolution':'欲望演化',
      'Scar Explorer':'创伤浏览器', 'Personality Drift':'人格漂移',
      'Reasoning Trace':'推理轨迹', 'Session Replay':'会话回放',
      'Cognitive Timeline':'认知时间线',
    };
    function capText(v) { return CAP_MAP[v] || v; }

    // ── View Switcher ─────────────────────────────────────────────────
    function switchView(name) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + name).classList.add('active');
      document.querySelectorAll('.tab').forEach((t,i) => {
        const views = ['split','sylanne','dashboard','captree','observatory','mutation'];
        t.classList.toggle('active', views[i] === name);
      });
      if (name === 'split') loadIframes();
      if (name === 'sylanne') loadIframe('frame-sylanne2', urls.sylanne);
      if (name === 'dashboard') loadIframe('frame-dashboard2', urls.dashboard);
      if (name === 'captree') loadIframe('frame-captree2', urls.captree);
      if (name === 'observatory') loadObservatory();
      if (name === 'mutation') loadMutationHistory();
    }

    const urls = {
      sylanne: rp('/sylanne/?token=' + encodeURIComponent(token)),
      dashboard: rp('/dashboard/?token=' + encodeURIComponent(token)),
      captree: rp('/capability-tree/?token=' + encodeURIComponent(token)),
    };
    function loadIframe(id, url) { const el = document.getElementById(id); if (el) el.src = url; }

    // ── Health Bar ────────────────────────────────────────────────────
    function loadHealth() {
      fetch(rp('/api/state_inspector?token='+encodeURIComponent(token))).then(r=>r.json()).then(d=>{
        if(!d.success||!d.snapshot) return;
        const s=d.snapshot.summary||{};
        setH('h-hosts',s.active_hosts||0,'h-hosts-s',s.active_hosts>0);
        setH('h-memory',s.memory_systems||0,'h-memory-s',s.memory_systems>0);
        setH('h-sources',s.state_sources||0,'h-sources-s',s.state_sources>0);
        setH('h-kv',s.kv_api_available?'是':'否','h-kv-s',s.kv_api_available);
        setH('h-tasks',s.background_tasks||0,'h-tasks-s',true);
      }).catch(()=>{});
      fetch(rp('/api/runtime_events?limit=1&token='+encodeURIComponent(token))).then(r=>r.json()).then(d=>{
        const t=d.stats?.total||0;
        setH('h-events',t,'h-events-s',t>0);
      }).catch(()=>{});

    function setH(vid,val,sid,ok) {
      const v=document.getElementById(vid), s=document.getElementById(sid);
      if(v) v.textContent=typeof val==='number'?val:val;
      if(s){s.textContent=ok?'正常':'待触发';s.className='health-status '+(ok?'ok':'warn');}
    }

    // ── Sub-panel Loaders ─────────────────────────────────────────────
    function loadSubPanel(name) {
      const el = document.getElementById('sub-content');

      const loaders = {
        inspector: loadInspector, store: loadStore, tasks: loadTasks,
        memory: loadMemory, desire: loadDesire, scar: loadScar,
        drift: loadDrift, trace: loadTrace, replay: loadReplay, trend: loadTrend,
      };
      (loaders[name] || (()=>{}))(el);

    function loadInspector(el) {
      fetch(rp('/api/state_inspector?token='+encodeURIComponent(token))).then(r=>r.json()).then(d=>{
        if(!d.success||!d.snapshot){el.innerHTML=emptyHTML('状态检查器','offline');return;}
        const s=d.snapshot.summary||{};
        const files=d.snapshot.persistence_files||{};
        let html=`<div class="health-bar" style="grid-template-columns:repeat(4,1fr);margin-bottom:12px;">
          ${metric('主机',s.active_hosts||0)}${metric('脏会话',s.dirty_sessions||0)}
          ${metric('记忆系统',s.memory_systems||0)}${metric('缓冲区',s.conversation_buffers||0)}
        </div>`;
        const sessions=Array.isArray(d.snapshot.sessions)?d.snapshot.sessions.slice(0,8):[];
        if(sessions.length){
          html+='<div style="font-size:12px;font-weight:600;margin-bottom:8px;">会话列表</div>';
          sessions.forEach(sess=>{
            const dirty=Array.isArray(sess.dirty_subsystems)?sess.dirty_subsystems:[];
            html+=`<div class="data-row"><div><div class="data-name">${esc(sess.session_key||'default')}</div><div class="data-meta">轮次 ${sess.host?.turns||0} · 节拍 ${sess.host?.spine_ticks||0}</div></div><div class="data-tags"><span class="tag ${dirty.length?'tag-missing':'tag-present'}">${dirty.length?'脏: '+dirty.join(', '):'干净'}</span></div></div>`;

          html+=emptyHTML('暂无活跃会话','首次对话后将自动创建会话');
        }

      }).catch(()=>{el.innerHTML=emptyHTML('状态检查器','加载失败');});

    // ── Timeline ──────────────────────────────────────────────────────
    function loadTimeline() {
      if (demoMode) { loadTimelineDemo(); return; }
      const el=document.getElementById('timeline-events');
      fetch(rp('/api/runtime_events?limit=50&token='+encodeURIComponent(token))).then(r=>r.json()).then(d=>{
        if(!d.success||!d.events||!d.events.length){el.innerHTML='<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">暂无运行事件</div><div class="empty-desc">首次对话后会开始记录认知事件。</div></div>';return;}
        el.innerHTML=d.events.map(ev=>{
          const sev=String(ev.severity||'info').toLowerCase();
          const sevLabel={info:'信息',warning:'警告',error:'错误'}[sev]||sev;
          return `<div class="ev"><span class="ev-time">${fmtTime(ev.ts)}</span><span class="ev-type">${esc(ev.type||'event')}</span><span class="ev-detail">${esc(summarizePayload(ev.payload||{})).slice(0,120)}<span class="ev-tag ${sev}">${sevLabel}</span>${ev.session_key?`<span class="ev-tag info">${esc(ev.session_key)}</span>`:''}</span></div>`;
        }).join('');
      }).catch(()=>{el.innerHTML='<div class="empty"><div class="empty-icon">❌</div><div class="empty-title">加载失败</div></div>';});
    }

    function searchEvents() {
      const q=document.getElementById('tl-search').value.trim();
      const sev=document.getElementById('tl-severity').value;
      const el=document.getElementById('timeline-events');
      if(!q&&!sev){loadTimeline();return;}
      let url=rp('/api/event_search?limit=50&token='+encodeURIComponent(token));
      if(q) url+='&query='+encodeURIComponent(q);
      if(sev) url+='&severity='+encodeURIComponent(sev);
      fetch(url).then(r=>r.json()).then(d=>{
        if(!d.ok||!d.events||!d.events.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">未找到匹配事件</div><div class="empty-desc">尝试调整搜索关键词或筛选条件。</div></div>';return;}
        el.innerHTML=d.events.map(ev=>{
          const sev2=String(ev.severity||'info').toLowerCase();
          return `<div class="ev"><span class="ev-time">${fmtTime(ev.ts)}</span><span class="ev-type">${esc(ev.type||'event')}</span><span class="ev-detail">${esc(summarizePayload(ev.payload||{})).slice(0,120)}<span class="ev-tag ${sev2}">${sev2}</span></span></div>`;
        }).join('');
      }).catch(()=>{el.innerHTML='<div class="empty"><div class="empty-icon">❌</div><div class="empty-title">搜索失败</div></div>';});
    }

    function compactEvents() {
      if(!confirm('确定要压缩 7 天前的旧事件？此操作不可撤销。')) return;
      fetch(rp('/api/event_compact?token='+encodeURIComponent(token)),{method:'POST',headers:{'Content-Type':'application/json'}}).then(r=>r.json()).then(d=>{
        if(d.ok){alert('压缩完成，已删除 '+d.removed_count+' 条旧事件。');loadTimeline();}
        else{alert('压缩失败: '+(d.error||'未知错误'));}
      }).catch(()=>alert('请求失败'));
    }

    // ── Snapshot Management ───────────────────────────────────────────
    function createSnapshot() {
      const name=prompt('输入快照名称（留空自动生成）：');
      if(name===null) return;
      fetch(rp('/api/state_snapshot?token='+encodeURIComponent(token)),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name||undefined})}).then(r=>r.json()).then(d=>{
        if(d.ok){alert('快照创建成功！');loadSnapshots();}
        else{alert('创建失败: '+(d.error||'未知错误'));}
      }).catch(()=>alert('请求失败'));
    }
    function rollbackSnapshot(name) {
      if(!confirm('确定要回滚到快照 "'+name+'"？当前事件将被替换。')) return;
      fetch(rp('/api/state_rollback?token='+encodeURIComponent(token)),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})}).then(r=>r.json()).then(d=>{
        if(d.ok){alert('回滚成功！');loadTimeline();loadSnapshots();}
        else{alert('回滚失败: '+(d.error||'未知错误'));}
      }).catch(()=>alert('请求失败'));
    }
    function deleteSnapshot(name) {
      if(!confirm('确定要删除快照 "'+name+'"？')) return;
      fetch(rp('/api/snapshot_delete?name='+encodeURIComponent(name)+'&token='+encodeURIComponent(token)),{method:'DELETE'}).then(r=>r.json()).then(d=>{
        if(d.ok){loadSnapshots();}
        else{alert('删除失败: '+(d.error||'未知错误'));}
      }).catch(()=>alert('请求失败'));
    }
    function rollbackSource(name) {
      if(name==='persona_core'){triggerRollback();return;}
      alert('暂不支持回滚 '+name+'。仅支持核心人设回滚。');
    }

    // ── Mutation History ──────────────────────────────────────────────
    function loadMutationHistory() {
      const el=document.getElementById('mutation-timeline');
      const splitEl=document.getElementById('split-mutation');
      fetch(rp('/api/mutation_history?token='+encodeURIComponent(token))).then(r=>r.json()).then(d=>{
        const html=(!d.ok||!d.history||!d.history.length)
          ?'<div class="empty"><div class="empty-icon">🧬</div><div class="empty-title">暂无突变记录</div><div class="empty-desc">核心突变会在以下条件下产生：<br>· 开启 danger_core_mutation<br>· 开启 danger_core_mutation_confirm<br>· 经过多轮深度对话后自动触发</div><div class="empty-hint">当前配置：未启用（需在插件配置中开启高危模块）</div></div>'
          :d.history.reverse().map(item=>{
            const t=item.timestamp?new Date(item.timestamp).toLocaleString('zh-CN'):'未知时间';
            const desc=item.description_redacted?`描述已脱敏 · 长度=${Number(item.description_length||0)} · 指纹=${esc(item.description_fingerprint||'无')}`:esc(item.description||'无描述');
            return `<div class="data-row"><div><div class="data-name">${esc(item.type||'突变')}</div><div class="data-meta">${t} · ${desc}</div></div></div>`;
          }).join('');
        if(el) el.innerHTML=html;
        if(splitEl) splitEl.innerHTML=html||'<div class="empty" style="padding:20px;"><div class="empty-icon">🧬</div><div class="empty-title">暂无突变记录</div></div>';
      }).catch(()=>{
        const msg='<div class="empty"><div class="empty-icon">❌</div><div class="empty-title">加载失败</div></div>';
        if(el) el.innerHTML=msg;
        if(splitEl) splitEl.innerHTML=msg;
      });
    }
    function triggerRollback() {
      if(!confirm('确定要回滚至上一人设版本？')) return;
      fetch(rp('/api/mutation_rollback?token='+encodeURIComponent(token)),{method:'POST',headers:{'Content-Type':'application/json','X-CSRF-Token':csrfToken}}).then(r=>r.json()).then(d=>{
        if(d.ok){alert('回滚成功！');loadMutationHistory();}
        else{alert('回滚失败: '+(d.error||'未知错误'));}
      }).catch(()=>alert('请求失败'));
    }

    // ── Helpers ───────────────────────────────────────────────────────
    function metric(label,value) {
      return `<div class="health-item"><div class="health-label">${esc(label)}</div><div class="health-value" style="font-size:16px;">${esc(value)}</div></div>`;
    }
    function emptyHTML(title,desc) {
      return `<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">${esc(title)}</div><div class="empty-desc">${esc(desc)}</div></div>`;
    }

    function showHelp(panel) {
      const doc = HELP_DOCS[panel];
      if (!doc) return;
      const tips = doc.tips.map(t => `· ${t}`).join('<br>');
      alert(`【${doc.title}】\n\n${doc.desc}\n\n要点：\n${tips}`);
    }

    // ── Demo Data ─────────────────────────────────────────────────────
    let demoMode = false;
    function toggleDemoMode() {
      demoMode = !demoMode;
      const btn = document.getElementById('demo-btn');
      if (btn) btn.textContent = demoMode ? '演示模式: 开' : '演示模式: 关';
      loadObservatory();
    }

    function demoTimeline() {
      return [
        { ts: Date.now()/1000-10, type: 'plugin.initialized', severity: 'info', payload: { sylanne_ready: true, version: '1.4.0' } },
        { ts: Date.now()/1000-8, type: 'state.atomic_update_committed', severity: 'info', payload: { key: 'anima_state', size: 2990 } },
        { ts: Date.now()/1000-5, type: 'response.observed', severity: 'info', payload: { text_chars: 245, emotion_score: 0.42 } },
        { ts: Date.now()/1000-3, type: 'desire.queue_updated', severity: 'info', payload: { active: 2, satisfied: 1 } },
        { ts: Date.now()/1000-1, type: 'prompt.injection_assembled', severity: 'info', payload: { injected_slots: ['state', 'desire'] } },
      ];
    }

    function loadTimelineDemo() {
      const el = document.getElementById('timeline-events');
      const events = demoTimeline();
      el.innerHTML = events.map(ev => {
        const sev = String(ev.severity || 'info').toLowerCase();
        const sevLabel = {info:'信息',warning:'警告',error:'错误'}[sev] || sev;
        return `<div class="ev"><span class="ev-time">${fmtTime(ev.ts)}</span><span class="ev-type">${esc(ev.type)}</span><span class="ev-detail">${esc(summarizePayload(ev.payload))}<span class="ev-tag ${sev}">${sevLabel}</span></span></div>`;
      }).join('');
    }

    // ── Refresh All ───────────────────────────────────────────────────
    function loadObservatory() { loadHealth(); loadSubPanel(currentSub); loadTimeline(); }
    function refreshAll() {
      loadIframes();
      loadObservatory();
      loadMutationHistory();
    }

    // ── Auto-refresh Timeline ─────────────────────────────────────────
    let autoRefreshTimer = null;
    let autoRefreshEnabled = true;
    let eventSource = null;
    let lastEventId = 0;

    function startSSE() {
      if (eventSource) eventSource.close();
      eventSource = new EventSource(rp('/api/events/stream?last_id=' + lastEventId + '&token=' + encodeURIComponent(token)));
      eventSource.onmessage = function(e) {
        try {
          const data = JSON.parse(e.data);
          if (data.type === 'event' && data.event) {
            lastEventId = Math.max(lastEventId, data.event.id || 0);
            appendTimelineEvent(data.event);
          } else if (data.type === 'connected') {
            lastEventId = data.last_id || 0;
          } else if (data.type === 'heartbeat') {
            lastEventId = data.last_id || lastEventId;
          }
        } catch(err) {}
      };
      eventSource.onerror = function() {
        setTimeout(startSSE, 3000);
      };
    }

    function appendTimelineEvent(ev) {
      const el = document.getElementById('timeline-events');
      if (!el) return;
      const emptyEl = el.querySelector('.empty');
      if (emptyEl) el.innerHTML = '';
      const sev = String(ev.severity || 'info').toLowerCase();
      const sevLabel = {info:'信息',warning:'警告',error:'错误'}[sev] || sev;
      const html = `<div class="ev" style="background:rgba(99,102,241,0.05);border-left:2px solid var(--accent);"><span class="ev-time">${fmtTime(ev.ts)}</span><span class="ev-type">${esc(ev.type||'event')}</span><span class="ev-detail">${esc(summarizePayload(ev.payload||{})).slice(0,120)}<span class="ev-tag ${sev}">${sevLabel}</span>${ev.session_key?`<span class="ev-tag info">${esc(ev.session_key)}</span>`:''}</span></div>`;
      el.insertAdjacentHTML('afterbegin', html);
      while (el.children.length > 50) el.removeChild(el.lastChild);
    }

    function startAutoRefresh() {
      startSSE();
    }
    function stopAutoRefresh() {
      if (eventSource) { eventSource.close(); eventSource = null; }
    }
    function toggleAutoRefresh() {
      autoRefreshEnabled = !autoRefreshEnabled;
      const btn = document.getElementById('auto-refresh-btn');
      if (autoRefreshEnabled) { startSSE(); if (btn) btn.textContent = '实时推送: 开'; }
      else { stopAutoRefresh(); if (btn) btn.textContent = '实时推送: 关'; }
    }

    // ── Init ──────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      loadIframes();
      fetch(rp('/api/state?token='+encodeURIComponent(token))).then(r=>r.json()).then(d=>{csrfToken=d.csrfToken||'';}).catch(()=>{}).finally(()=>{
        loadObservatory();
        loadMutationHistory();
        startAutoRefresh();
      });
    });
  </script>
