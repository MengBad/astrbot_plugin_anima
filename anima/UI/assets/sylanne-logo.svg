<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Sylanne Lab Logo: Spine + Pulse + Boundary + Data Readout -->

  <!-- Vertical spine (computation backbone) -->
  <path d="M 45 12 L 45 38 L 37 44 L 53 56 L 45 62 L 45 88"
        fill="none" stroke="currentColor" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Autopoietic boundary arc (left) -->
  <path d="M 33 20 C 14 28, 14 72, 33 80"
        fill="none" stroke="currentColor" stroke-width="4.5"
        stroke-linecap="round" opacity="0.45"/>

  <!-- Signal node (life spark) -->
  <circle cx="53" cy="56" r="5" fill="#B88A9E"/>

  <!-- Right side: data readout lines (curved lengths to suggest circular boundary) -->
  <line x1="64" y1="28" x2="72" y2="28" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="64" y1="38" x2="80" y2="38" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="64" y1="48" x2="84" y2="48" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="64" y1="58" x2="82" y2="58" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="64" y1="68" x2="76" y2="68" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
  <line x1="64" y1="78" x2="68" y2="78" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
</svg>
