<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anima Cognitive Observatory</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111827;
      --panel: #1f2937;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: rgba(148, 163, 184, 0.22);
      --accent: #f59e0b;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 18%, rgba(245, 158, 11, 0.22), transparent 28%),
        radial-gradient(circle at 82% 82%, rgba(14, 165, 233, 0.2), transparent 32%),
        var(--bg);
      color: var(--text);
    }

    main {
      width: min(760px, 100%);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(145deg, rgba(31, 41, 55, 0.96), rgba(15, 23, 42, 0.92));
      box-shadow: 0 22px 80px rgba(0, 0, 0, 0.38);
    }

    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 10px 0 10px;
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 12px;
      color: #111827;
      background: var(--accent);
      text-decoration: none;
      font-weight: 800;
    }

    a.secondary {
      color: var(--text);
      background: rgba(148, 163, 184, 0.12);
      border: 1px solid var(--line);
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Anima Unified Plugin Page</div>
    <h1>进入 Cognitive Observatory</h1>
    <p>
      Anima 现在只暴露一个 AstrBot 插件页面入口。能力树、运行仪表盘、Sylanne 面板和认知观测台都收束在统一 Portal 中，
      旧的内部路径仍保留给 iframe 与独立 WebUI 使用。
    </p>
    <div class="actions">
      <a href="/astrbot_plugin_anima/">打开统一 Portal</a>
      <a class="secondary" href="/astrbot_plugin_anima/health">检查健康状态</a>
    </div>
  </main>
  <script>
    const target = "/astrbot_plugin_anima/" + window.location.search;
    window.setTimeout(() => {
      window.location.replace(target);
    }, 250);
  </script>
</body>
</html>
